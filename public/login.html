<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理员登录</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Playfair+Display:wght@700;800&family=Source+Serif+4:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/handdrawn.css" />
  </head>
  <body>
    <main class="flex min-h-screen items-center justify-center bg-[#FFFFFF] px-4 py-16">
      <section class="paper-panel w-full max-w-md bg-[#FFFFFF] p-8 sm:p-10">
        <div class="mb-10 border-b-4 border-[#000000] pb-8">
          <img data-logo class="h-14 w-14 object-contain" />
          <p class="font-mono mt-8 text-xs uppercase tracking-[0.28em] text-[#525252]">Private desk</p>
          <h1 class="font-title mt-3 text-5xl leading-none">Admin Login</h1>
        </div>
        <form id="loginForm" class="space-y-8">
          <label class="block">
            <span class="editor-label mb-3 block text-xs text-[#525252]">Password</span>
            <input id="password" type="password" class="paper-input px-0 py-3 text-2xl" autocomplete="current-password" />
          </label>
          <button type="submit" class="paper-button button-primary w-full px-5 py-4 text-xs">Login</button>
        </form>
        <a href="/" class="paper-button button-ghost mt-8 text-xs">Back to portfolio</a>
      </section>
    </main>

    <script src="/js/config.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/login.js"></script>
  </body>
</html>
